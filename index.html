<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyM Group - Control de Inventario</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SyM Group">
    <link rel="apple-touch-icon" href="logo-tech.png?v=5">
    <link rel="icon" type="image/png" href="logo-tech.png?v=5">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .tab-active { border-bottom: 3px solid #a3e635; color: #a3e635; }
        .glass { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 10px; width: 100%; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 sticky top-0 z-40 glass border-b border-slate-800">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-lime-400">SyM GROUP</h1>
                <p class="text-xs text-slate-400">Tech & Fórmulas</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase">Ventas Hoy</p>
                <p id="total-ventas" class="text-lg font-bold text-white">MX$0.00</p>
            </div>
        </div>
    </header>

    <main class="p-4">
        
        <section id="tab-almacen" class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Inventario</h2>
                <button onclick="toggleModal('modal-producto')" class="bg-lime-500 text-black px-4 py-2 rounded-full font-bold text-sm shadow-lg">+ Nuevo</button>
            </div>
            <div id="lista-productos" class="space-y-3"></div>
        </section>

        <section id="tab-ventas" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Registro de Ventas</h2>
                <button onclick="abrirModalVenta()" class="bg-blue-500 text-white px-4 py-2 rounded-full font-bold text-sm shadow-lg">+ Venta</button>
            </div>
            <div id="lista-ventas" class="space-y-3"></div>
        </section>

        <section id="tab-clientes" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Mis Clientes</h2>
                <button onclick="toggleModal('modal-cliente')" class="bg-purple-500 text-white px-4 py-2 rounded-full font-bold text-sm shadow-lg">+ Cliente</button>
            </div>
            <div id="lista-clientes" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-slate-800 flex justify-around p-4 z-40">
        <button onclick="switchTab('almacen')" class="flex flex-col items-center tab-active" id="btn-almacen">
            <span class="text-xs mt-1 font-semibold">📦 Almacén</span>
        </button>
        <button onclick="switchTab('ventas')" class="flex flex-col items-center text-slate-400" id="btn-ventas">
            <span class="text-xs mt-1 font-semibold">💰 Ventas</span>
        </button>
        <button onclick="switchTab('clientes')" class="flex flex-col items-center text-slate-400" id="btn-clientes">
            <span class="text-xs mt-1 font-semibold">👥 Clientes</span>
        </button>
    </nav>

    <div id="modal-producto" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl p-6 space-y-4 border border-slate-700">
            <h3 class="text-xl font-bold text-lime-400">Agregar al Inventario</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="p-nombre" placeholder="Nombre del Producto" class="col-span-2">
                <input type="number" id="p-costo" placeholder="Costo Inversión MX$">
                <input type="number" id="p-precio" placeholder="Precio Venta MX$">
                <input type="number" id="p-stock" placeholder="Stock Inicial">
                <input type="number" id="p-minimo" placeholder="Stock Mínimo (Alerta)">
                <input type="date" id="p-vencimiento" class="col-span-2 text-slate-400">
            </div>
            <div class="flex gap-2">
                <button onclick="toggleModal('modal-producto')" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold">Cancelar</button>
                <button onclick="guardarProducto()" class="flex-1 bg-lime-500 text-black font-bold py-3 rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal-venta" class="fixed inset-0 bg-black/80 hidden z-50
