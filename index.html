<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYM Dreams - Gestión Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KYM Dreams">
    <link rel="apple-touch-icon" href="logokym.png?v=10">
    <link rel="icon" type="image/png" href="logokym.png?v=10">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .tab-active { border-bottom: 3px solid #a3e635; color: #a3e635; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 10px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 sticky top-0 z-50 glass border-b border-slate-800">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-lime-400">KYM DREAMS</h1>
                <p class="text-xs text-slate-400">Gestión de Fórmulas Lácteas</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase">Ganancia Hoy</p>
                <p id="ganancia-dia" class="text-lg font-bold text-white">MX$0.00</p>
            </div>
        </div>
    </header>

    <main id="app-content" class="p-4">
        
        <section id="tab-almacen" class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Inventario de Stock</h2>
                <button onclick="toggleModal('modal-producto')" class="bg-lime-500 text-black px-4 py-2 rounded-full font-bold text-sm">+ Nuevo</button>
            </div>
            <div id="lista-productos" class="space-y-3">
                </div>
        </section>

        <section id="tab-ventas" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Registro de Ventas</h2>
                <button onclick="toggleModal('modal-venta')" class="bg-blue-500 text-white px-4 py-2 rounded-full font-bold text-sm">Registrar Venta</button>
            </div>
            <div id="lista-ventas" class="space-y-3">
                </div>
        </section>

        <section id="tab-clientes" class="hidden space-y-4">
            <h2 class="text-lg font-semibold">Predicción de Compras</h2>
            <div id="lista-clientes" class="space-y-3">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-slate-800 flex justify-around p-4 z-50">
        <button onclick="switchTab('almacen')" class="flex flex-col items-center tab-active" id="btn-almacen">
            <span class="text-xs mt-1">Almacén</span>
        </button>
        <button onclick="switchTab('ventas')" class="flex flex-col items-center text-slate-400" id="btn-ventas">
            <span class="text-xs mt-1">Ventas</span>
        </button>
        <button onclick="switchTab('clientes')" class="flex flex-col items-center text-slate-400" id="btn-clientes">
            <span class="text-xs mt-1">Clientes</span>
        </button>
    </nav>

    <div id="modal-producto" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl p-6 space-y-4 border border-slate-700">
            <h3 class="text-xl font-bold">Agregar Producto</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="p-nombre" placeholder="Nombre Producto" class="col-span-2">
                <input type="text" id="p-proveedor" placeholder="Proveedor">
                <input type="number" id="p-precio" placeholder="Precio MX$">
                <input type="number" id="p-stock" placeholder="Stock Inicial">
                <input type="number" id="p-minimo" placeholder="Stock Mínimo">
                <input type="text" id="p-lote" placeholder="Lote">
                <input type="date" id="p-vencimiento" placeholder="Vencimiento">
            </div>
            <div class="flex gap-2">
                <button onclick="toggleModal('modal-producto')" class="flex-1 bg-slate-800 py-3 rounded-xl">Cancelar</button>
                <button onclick="guardarProducto()" class="flex-1 bg-lime-500 text-black font-bold py-3 rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURA TUS CREDENCIALES AQUÍ
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LÓGICA DE NAVEGACIÓN
        window.switchTab = (tab) => {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-lime-400'));
            document.getElementById(`btn-${tab}`).classList.add('tab-active', 'text-lime-400');
        };

        window.toggleModal = (id) => {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        };

        // LÓGICA DE PRODUCTOS
        window.guardarProducto = () => {
            const producto = {
                nombre: document.getElementById('p-nombre').value,
                proveedor: document.getElementById('p-proveedor').value,
                precio: parseFloat(document.getElementById('p-precio').value),
                stock: parseInt(document.getElementById('p-stock').value),
                minimo: parseInt(document.getElementById('p-minimo').value),
                lote: document.getElementById('p-lote').value,
                vencimiento: document.getElementById('p-vencimiento').value
            };
            
            push(ref(db, 'almacen'), producto);
            toggleModal('modal-producto');
            alert("Producto guardado");
        };

        // ESCUCHA DE DATOS (Realtime)
        onValue(ref(db, 'almacen'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";
            
            for(let id in data) {
                const p = data[id];
                const vencido = new Date(p.vencimiento) < new Date();
                const bajoStock = p.stock <= p.minimo;

                container.innerHTML += `
                    <div class="bg-slate-900 p-4 rounded-xl border ${bajoStock ? 'border-red-500' : 'border-slate-800'}">
                        <div class="flex justify-between">
                            <h4 class="font-bold text-lime-400">${p.nombre}</h4>
                            <span class="text-xs px-2 py-1 bg-slate-800 rounded">Lote: ${p.lote}</span>
                        </div>
                        <div class="grid grid-cols-2 mt-2 text-sm gap-2">
                            <p class="text-slate-400">Stock: <span class="${bajoStock ? 'text-red-500 font-bold' : 'text-white'}">${p.stock}</span></p>
                            <p class="text-slate-400 text-right">Precio: MX$${p.precio}</p>
                            <p class="text-xs ${vencido ? 'text-red-400 font-bold' : 'text-slate-500'}">Vence: ${p.vencimiento}</p>
                        </div>
                    </div>
                `;
            }
        });

    </script>
</body>
</html>
