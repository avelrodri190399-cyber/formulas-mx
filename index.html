<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyM Group - Control de Inventario</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SyM Group">
    <link rel="apple-touch-icon" href="logo-tech.png?v=5">
    <link rel="icon" type="image/png" href="logo-tech.png?v=5">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .tab-active { border-bottom: 3px solid #a3e635; color: #a3e635; }
        .glass { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 10px; width: 100%; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 sticky top-0 z-40 glass border-b border-slate-800">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-lime-400">SyM GROUP</h1>
                <p class="text-xs text-slate-400">Tech & Fórmulas</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase">Ventas Hoy</p>
                <p id="total-ventas" class="text-lg font-bold text-white">MX$0.00</p>
            </div>
        </div>
    </header>

    <main class="p-4">
        
        <section id="tab-almacen" class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Inventario</h2>
                <button onclick="toggleModal('modal-producto')" class="bg-lime-500 text-black px-4 py-2 rounded-full font-bold text-sm shadow-lg">+ Nuevo</button>
            </div>
            <div id="lista-productos" class="space-y-3"></div>
        </section>

        <section id="tab-ventas" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Registro de Ventas</h2>
                <button onclick="abrirModalVenta()" class="bg-blue-500 text-white px-4 py-2 rounded-full font-bold text-sm shadow-lg">+ Venta</button>
            </div>
            <div id="lista-ventas" class="space-y-3"></div>
        </section>

        <section id="tab-clientes" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">Mis Clientes</h2>
                <button onclick="toggleModal('modal-cliente')" class="bg-purple-500 text-white px-4 py-2 rounded-full font-bold text-sm shadow-lg">+ Cliente</button>
            </div>
            <div id="lista-clientes" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-slate-800 flex justify-around p-4 z-40">
        <button onclick="switchTab('almacen')" class="flex flex-col items-center tab-active" id="btn-almacen">
            <span class="text-xs mt-1 font-semibold">📦 Almacén</span>
        </button>
        <button onclick="switchTab('ventas')" class="flex flex-col items-center text-slate-400" id="btn-ventas">
            <span class="text-xs mt-1 font-semibold">💰 Ventas</span>
        </button>
        <button onclick="switchTab('clientes')" class="flex flex-col items-center text-slate-400" id="btn-clientes">
            <span class="text-xs mt-1 font-semibold">👥 Clientes</span>
        </button>
    </nav>

    <div id="modal-producto" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl p-6 space-y-4 border border-slate-700">
            <h3 class="text-xl font-bold text-lime-400">Agregar al Inventario</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="p-nombre" placeholder="Nombre del Producto" class="col-span-2">
                <input type="number" id="p-costo" placeholder="Costo Inversión MX$">
                <input type="number" id="p-precio" placeholder="Precio Venta MX$">
                <input type="number" id="p-stock" placeholder="Stock Inicial">
                <input type="number" id="p-minimo" placeholder="Stock Mínimo (Alerta)">
                <input type="date" id="p-vencimiento" class="col-span-2 text-slate-400">
            </div>
            <div class="flex gap-2">
                <button onclick="toggleModal('modal-producto')" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold">Cancelar</button>
                <button onclick="guardarProducto()" class="flex-1 bg-lime-500 text-black font-bold py-3 rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal-venta" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl p-6 space-y-4 border border-slate-700">
            <h3 class="text-xl font-bold text-blue-400">Registrar Nueva Venta</h3>
            <select id="v-producto" class="w-full text-slate-400">
                </select>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="v-cantidad" placeholder="Cantidad a vender">
                <input type="text" id="v-cliente" placeholder="Nombre Cliente">
            </div>
            <div class="flex gap-2">
                <button onclick="toggleModal('modal-venta')" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold">Cancelar</button>
                <button onclick="guardarVenta()" class="flex-1 bg-blue-500 text-white font-bold py-3 rounded-xl">Vender y Descontar</button>
            </div>
        </div>
    </div>

    <div id="modal-cliente" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl p-6 space-y-4 border border-slate-700">
            <h3 class="text-xl font-bold text-purple-400">Registrar Cliente</h3>
            <input type="text" id="c-nombre" placeholder="Nombre del Cliente" class="w-full">
            <input type="text" id="c-telefono" placeholder="Teléfono / Contacto" class="w-full">
            <div class="flex gap-2 mt-4">
                <button onclick="toggleModal('modal-cliente')" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold">Cancelar</button>
                <button onclick="guardarCliente()" class="flex-1 bg-purple-500 text-white font-bold py-3 rounded-xl">Guardar Cliente</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // *** CREDENCIALES REALES DE SYM GROUP ***
        const firebaseConfig = {
            apiKey: "AIzaSyCuJ5Wzolm3zJlY2diOfjCDwikkE2leb5A",
            authDomain: "inventarioformulas.firebaseapp.com",
            projectId: "inventarioformulas",
            storageBucket: "inventarioformulas.firebasestorage.app",
            messagingSenderId: "410190961454",
            appId: "1:410190961454:web:fedeb4b96b2bc01462f8bf",
            measurementId: "G-Z1NDDTWXE1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables Globales para cálculos
        let inventarioGlobal = {};

        // Cambiar pestañas
        window.switchTab = (tab) => {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-lime-400', 'text-blue-400', 'text-purple-400'));
            
            let colorClase = tab === 'almacen' ? 'text-lime-400' : tab === 'ventas' ? 'text-blue-400' : 'text-purple-400';
            document.getElementById(`btn-${tab}`).classList.add('tab-active', colorClase);
        };

        window.toggleModal = (id) => {
            document.getElementById(id).classList.toggle('hidden');
        };

        // 1. GUARDAR PRODUCTO
        window.guardarProducto = () => {
            const producto = {
                nombre: document.getElementById('p-nombre').value,
                costo: parseFloat(document.getElementById('p-costo').value || 0),
                precio: parseFloat(document.getElementById('p-precio').value || 0),
                stock: parseInt(document.getElementById('p-stock').value || 0),
                minimo: parseInt(document.getElementById('p-minimo').value || 0),
                vencimiento: document.getElementById('p-vencimiento').value || 'Sin fecha'
            };
            if(!producto.nombre) return alert("Ponle nombre al producto");
            
            push(ref(db, 'almacen'), producto);
            toggleModal('modal-producto');
            alert("✅ Producto guardado en SyM Group");
        };

        // 2. ABRIR MODAL VENTA (Carga los productos)
        window.abrirModalVenta = () => {
            const select = document.getElementById('v-producto');
            select.innerHTML = '<option value="">Selecciona un producto...</option>';
            for(let id in inventarioGlobal) {
                if(inventarioGlobal[id].stock > 0) {
                    select.innerHTML += `<option value="${id}">${inventarioGlobal[id].nombre} (Disp: ${inventarioGlobal[id].stock})</option>`;
                }
            }
            toggleModal('modal-venta');
        };

        // 3. GUARDAR VENTA Y DESCONTAR STOCK
        window.guardarVenta = () => {
            const prodId = document.getElementById('v-producto').value;
            const cantidad = parseInt(document.getElementById('v-cantidad').value);
            const cliente = document.getElementById('v-cliente').value || "Público General";
            
            if(!prodId || !cantidad) return alert("Faltan datos de la venta");
            
            const producto = inventarioGlobal[prodId];
            if(cantidad > producto.stock) return alert("No tienes suficiente stock para vender esa cantidad");

            // Crear el registro de venta
            const venta = {
                productoId: prodId,
                nombre_producto: producto.nombre,
                cantidad: cantidad,
                cliente: cliente,
                precio_total: producto.precio * cantidad,
                ganancia_neta: (producto.precio - producto.costo) * cantidad,
                fecha: new Date().toLocaleDateString()
            };

            // Restar del inventario
            const nuevoStock = producto.stock - cantidad;

            // Enviar a Firebase ambas cosas
            push(ref(db, 'ventas'), venta);
            update(ref(db, 'almacen/' + prodId), { stock: nuevoStock });

            toggleModal('modal-venta');
            alert("💸 Venta registrada y stock actualizado");
        };

        // 4. GUARDAR CLIENTE
        window.guardarCliente = () => {
            const cliente = {
                nombre: document.getElementById('c-nombre').value,
                telefono: document.getElementById('c-telefono').value,
                fecha_registro: new Date().toLocaleDateString()
            };
            if(!cliente.nombre) return alert("Falta el nombre");
            
            push(ref(db, 'clientes'), cliente);
            toggleModal('modal-cliente');
            alert("👥 Cliente registrado");
        };

        // ================= LECTURA EN TIEMPO REAL =================

        // Cargar Inventario
        onValue(ref(db, 'almacen'), (snapshot) => {
            inventarioGlobal = snapshot.val() || {};
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";
            
            for(let id in inventarioGlobal) {
                const p = inventarioGlobal[id];
                const bajoStock = p.stock <= p.minimo;
                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl border ${bajoStock ? 'border-red-500' : 'border-slate-700'}">
                        <div class="flex justify-between items-center">
                            <h4 class="font-bold text-lime-400">${p.nombre}</h4>
                            <span class="bg-slate-900 px-2 py-1 rounded text-xs">Vence: ${p.vencimiento}</span>
                        </div>
                        <div class="grid grid-cols-2 mt-2 text-sm">
                            <p>Stock: <span class="${bajoStock ? 'text-red-500 font-bold' : 'text-white'}">${p.stock}</span></p>
                            <p class="text-right text-slate-300">Precio: MX$${p.precio}</p>
                        </div>
                    </div>
                `;
            }
        });

        // Cargar Ventas (Y sumar el total del día)
        onValue(ref(db, 'ventas'), (snapshot) => {
            const data = snapshot.val() || {};
            const container = document.getElementById('lista-ventas');
            container.innerHTML = "";
            let ventasDeHoy = 0;
            const hoy = new Date().toLocaleDateString();

            const ventasArr = Object.values(data).reverse(); // Para ver las más nuevas arriba
            
            ventasArr.forEach(v => {
                if(v.fecha === hoy) ventasDeHoy += v.precio_total;

                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                        <p class="text-xs text-slate-400">${v.fecha} - ${v.cliente}</p>
                        <h4 class="font-bold text-blue-400">${v.cantidad}x ${v.nombre_producto}</h4>
                        <div class="flex justify-between mt-1 text-sm">
                            <p>Total: <span class="text-white font-bold">MX$${v.precio_total}</span></p>
                            <p class="text-green-400">Ganancia: MX$${v.ganancia_neta}</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-ventas').innerText = "MX$" + ventasDeHoy;
        });

        // Cargar Clientes
        onValue(ref(db, 'clientes'), (snapshot) => {
            const data = snapshot.val() || {};
            const container = document.getElementById('lista-clientes');
            container.innerHTML = "";
            
            for(let id in data) {
                const c = data[id];
                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-purple-400">${c.nombre}</h4>
                            <p class="text-xs text-slate-400">Tel: ${c.telefono}</p>
                        </div>
                        <span class="text-xs bg-slate-900 px-2 py-1 rounded">Desde: ${c.fecha_registro}</span>
                    </div>
                `;
            }
        });

    </script>
</body>
</html>
