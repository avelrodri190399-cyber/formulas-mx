<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fórmulas MX"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1a2340"/>
<title>🍼 Inventario Fórmulas</title>
<link rel="apple-touch-icon" href="icono-formulas_1.png?v=3"/>
<link rel="icon" type="image/png" href="icono-formulas_1.png?v=3"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a2340;--navy2:#22305a;
  --orange:#ff6b35;--orange2:#ff8c42;
  --green:#27ae60;--red:#e53935;--blue:#3b82f6;
  --bg:#f0f3fa;--card:#fff;--text:#1a2340;--muted:#8b91a7;--border:#e4e8f0;
  --radius:16px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;gap:16px;transition:opacity .4s}
#loader .emoji{font-size:64px;animation:pulse 1.2s infinite}
#loader p{font-size:15px;opacity:.6;letter-spacing:.5px}
#loader.hide{opacity:0;pointer-events:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ── TOPBAR ── */
.topbar{background:var(--navy);color:#fff;position:sticky;top:0;z-index:90;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.topbar-inner{display:flex;align-items:center;padding:14px 16px;gap:12px}
.topbar-title{flex:1}
.topbar-title h1{font-size:18px;font-weight:800}
.topbar-title p{font-size:11px;opacity:.45;margin-top:2px}
.topbar-btn{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;box-shadow:0 3px 10px rgba(255,107,53,.35)}

/* ── SYNC BAR ── */
.sync-bar{background:#162038;padding:6px 16px;font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:var(--orange2);animation:blink .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── BOTTOM NAV ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--navy);display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 16px rgba(0,0,0,.2)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;opacity:.45;transition:all .2s;font-size:10px;font-weight:600;color:#fff;gap:3px;border:none;background:none;font-family:inherit}
.nav-item.active{opacity:1;color:var(--orange)}
.nav-icon{font-size:21px}

/* ── PAGES ── */
.page{display:none;padding:16px 16px 110px}
.page.active{display:block}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 14px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.stat-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800}

/* ── ALERT BANNER ── */
.alert-banner{background:#fff8f0;border:2px solid #ffcc80;border-radius:var(--radius);padding:14px;margin-bottom:16px;display:flex;gap:10px}
.alert-banner .atitle{font-weight:700;color:#e65100;font-size:14px;margin-bottom:5px}
.alert-banner .aitems{font-size:13px;color:#bf360c;line-height:1.7}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:12px 14px 12px 42px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;background:var(--card);color:var(--text);outline:none;font-family:inherit;transition:border .2s}
.search-wrap input:focus{border-color:var(--orange)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px}

/* ── PRODUCT CARDS ── */
.product-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:2px solid transparent;transition:border .2s}
.product-card.low-stock{border-color:#ffcc80;background:#fffcf5}
.prod-name{font-size:16px;font-weight:700;margin-bottom:11px;line-height:1.3;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.pf-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}
.pf-value{font-size:14px;font-weight:600}
.pf-big{font-size:22px;font-weight:800}
.c-green{color:var(--green)}
.c-red{color:var(--red)}
.c-orange{color:var(--orange2)}
.c-blue{color:var(--blue)}
.prod-actions{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.prod-actions button{flex:1;padding:9px 0;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-move{background:#e8f4fd;color:#1565c0}
.btn-edit{background:#fff3e0;color:#e65100}
.btn-del{background:#ffebee;color:var(--red);flex:0 0 42px}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-red{background:#ffebee;color:#c62828}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-orange{background:#fff3e0;color:#e65100}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty p{font-size:15px;font-weight:500}

/* ── MOV LIST ── */
.mov-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:14px;align-items:center}
.mov-dot{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.mov-dot.entrada{background:#e8f5e9}
.mov-dot.salida{background:#ffebee}
.mov-info{flex:1;min-width:0}
.mov-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mov-meta{font-size:12px;color:var(--muted)}
.mov-qty{font-size:19px;font-weight:800;flex-shrink:0}
.mov-qty.entrada{color:var(--green)}
.mov-qty.salida{color:var(--red)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(8,12,32,.6);z-index:200;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));width:100%;max-height:93vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.22,.61,.36,1)}
@keyframes slideUp{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-hdr h2{font-size:19px;font-weight:800}
.modal-close{background:#f4f6fb;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── FORM ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:700;color:#444;margin-bottom:6px}
.fg input,.fg select{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;font-family:inherit;outline:none;background:#fafbfd;color:var(--text);transition:border .15s;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--orange)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.req{color:var(--orange)}

/* ── CALENDARIO ── */
.cal-wrap{background:#fafbfd;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;display:none}
.cal-wrap.open{display:block}
.cal-header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.cal-header span{font-weight:700;font-size:15px}
.cal-nav{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 8px;border-radius:6px}
.cal-nav:hover{background:rgba(255,255,255,.15)}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:8px 4px 4px;gap:2px}
.cal-days-header span{font-size:11px;font-weight:700;color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 4px 12px;gap:2px}
.cal-day{padding:8px 2px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;border:none;background:none;font-family:inherit;color:var(--text);transition:all .15s}
.cal-day:hover{background:#f0f3fa}
.cal-day.today{color:var(--orange);font-weight:800}
.cal-day.selected{background:var(--orange);color:#fff;font-weight:700}
.cal-day.other-month{color:#ccc}
.cal-day.disabled{color:#ddd;cursor:not-allowed}
.cal-input-btn{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;font-family:inherit;background:#fafbfd;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border .15s}
.cal-input-btn:focus,.cal-input-btn.open{border-color:var(--orange)}
.cal-input-btn .placeholder{color:var(--muted)}

/* ── TOGGLE ── */
.toggle-row{display:flex;gap:10px;margin-bottom:4px}
.toggle-btn{flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.toggle-btn.entrada.active{background:var(--green);color:#fff}
.toggle-btn.salida.active{background:var(--red);color:#fff}
.toggle-btn:not(.active){background:#f0f3fa;color:var(--muted)}

/* ── BTN PRIMARY ── */
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--orange2),var(--orange));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(255,107,53,.3)}

/* ── SECTION TITLE ── */
.stitle{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 10px}

/* ── EXPORT BTN ── */
.export-btn{width:100%;padding:11px;background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:14px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}

/* ── PROD CONTEXT ── */
.prod-context{background:#f4f6fb;border-radius:10px;padding:10px 14px;font-size:14px;margin-bottom:16px;border-left:4px solid var(--orange)}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="emoji">🍼</div>
  <p>Conectando inventario...</p>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div style="font-size:24px">🍼</div>
    <div class="topbar-title">
      <h1>Inventario Fórmulas</h1>
      <p id="fecha-top"></p>
    </div>
    <button class="topbar-btn" onclick="abrirNuevoProducto()">＋ Agregar</button>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">Conectando...</span>
  </div>
</div>

<!-- PAGE: INVENTARIO -->
<div class="page active" id="page-inventario">
  <div class="stats-grid" id="stats-grid"></div>
  <div id="alert-banner" class="alert-banner" style="display:none">
    <span style="font-size:22px;flex-shrink:0">⚠️</span>
    <div><div class="atitle">Productos con stock bajo</div><div class="aitems" id="alert-items"></div></div>
  </div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar nombre, lote o proveedor..." oninput="renderProductos()"/>
  </div>
  <button class="export-btn" onclick="exportarCSV()">⬇️ Exportar a CSV (Excel)</button>
  <div class="stitle">Todos los productos</div>
  <div id="lista-productos"></div>
</div>

<!-- PAGE: MOVIMIENTOS -->
<div class="page" id="page-movimientos">
  <div class="stitle">Historial de movimientos</div>
  <div id="lista-movimientos"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="nav-item active" id="nav-inventario" onclick="cambiarVista('inventario')">
    <span class="nav-icon">📦</span>Inventario
  </button>
  <button class="nav-item" id="nav-movimientos" onclick="cambiarVista('movimientos')">
    <span class="nav-icon">📋</span>Movimientos
  </button>
</div>

<!-- MODAL: PRODUCTO -->
<div class="overlay" id="modal-producto">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-prod-title">➕ Nuevo Producto</h2>
      <button class="modal-close" onclick="cerrarModal('modal-producto')">✕</button>
    </div>
    <input type="hidden" id="edit-id"/>
    <div class="fg">
      <label>Nombre del Producto <span class="req">*</span></label>
      <input type="text" id="f-nombre" placeholder="Ej: Similac Total Comfort 1"/>
    </div>
    <div class="frow">
      <div class="fg">
        <label>Cantidad <span class="req">*</span></label>
        <input type="number" id="f-cantidad" placeholder="0" min="0"/>
      </div>
      <div class="fg">
        <label>Precio (MX$) <span class="req">*</span></label>
        <input type="number" id="f-precio" placeholder="0.00" step="0.01" min="0"/>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>Lote</label>
        <input type="text" id="f-lote" placeholder="Ej: L2024-001"/>
      </div>
      <div class="fg">
        <label>Proveedor</label>
        <input type="text" id="f-proveedor" placeholder="Ej: MedNutri"/>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>📅 Fecha Vencimiento</label>
        <button type="button" class="cal-input-btn" id="cal-btn-venc" onclick="toggleCal('venc')">
          <span id="cal-label-venc" class="placeholder">Seleccionar fecha</span>
          <span>📅</span>
        </button>
        <input type="hidden" id="f-vencimiento"/>
        <div class="cal-wrap" id="cal-venc"></div>
      </div>
      <div class="fg">
        <label>Stock Mínimo</label>
        <input type="number" id="f-stockmin" placeholder="10" value="10" min="0"/>
      </div>
    </div>
    <button class="btn-primary" onclick="guardarProducto()">💾 Guardar Producto</button>
  </div>
</div>

<!-- MODAL: MOVIMIENTO -->
<div class="overlay" id="modal-movimiento">
  <div class="modal">
    <div class="modal-hdr">
      <h2>📦 Registrar Movimiento</h2>
      <button class="modal-close" onclick="cerrarModal('modal-movimiento')">✕</button>
    </div>
    <div class="prod-context">
      Producto: <strong id="mov-prod-name"></strong>
    </div>
    <div class="fg">
      <label>Tipo de movimiento</label>
      <div class="toggle-row">
        <button class="toggle-btn entrada active" id="btn-entrada" onclick="setTipoMov('entrada')">⬆️ Entrada</button>
        <button class="toggle-btn salida" id="btn-salida" onclick="setTipoMov('salida')">⬇️ Salida</button>
      </div>
    </div>
    <div class="fg">
      <label>Cantidad <span class="req">*</span></label>
      <input type="number" id="m-cantidad" placeholder="0" min="1"/>
    </div>
    <div class="fg">
      <label>📅 Fecha del movimiento</label>
      <button type="button" class="cal-input-btn" id="cal-btn-mov" onclick="toggleCal('mov')">
        <span id="cal-label-mov" class="placeholder">Hoy</span>
        <span>📅</span>
      </button>
      <input type="hidden" id="m-fecha"/>
      <div class="cal-wrap" id="cal-mov"></div>
    </div>
    <div class="fg">
      <label>Motivo</label>
      <input type="text" id="m-motivo" placeholder="Ej: Venta, Compra, Ajuste"/>
    </div>
    <button class="btn-primary" onclick="guardarMovimiento()">✅ Registrar Movimiento</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuJ5Wzolm3zJ1y2dI0fjCDwikkE2leb5A",
  authDomain: "inventarioformulas.firebaseapp.com",
  projectId: "inventarioformulas",
  storageBucket: "inventarioformulas.firebasestorage.app",
  messagingSenderId: "410190961454",
  appId: "1:410190961454:web:fedeb4b96b2bc01462f8bf",
  measurementId: "G-Z1NDDTWXE1"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── STATE ─────────────────────────────────────────────────
let productos   = [];
let movimientos = [];
let tipoMov     = "entrada";
let movProdId   = null;

// ── FECHA ─────────────────────────────────────────────────
document.getElementById('fecha-top').textContent =
  new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── SYNC ──────────────────────────────────────────────────
function setSyncing(v){
  document.getElementById('sync-dot').className='sync-dot'+(v?' syncing':'');
  document.getElementById('sync-text').textContent = v ? 'Guardando...' : '✓ Sincronizado en tiempo real';
}
function setError(){
  document.getElementById('sync-dot').className='sync-dot error';
  document.getElementById('sync-text').textContent = '⚠ Sin conexión — revisa tu internet';
}

// ── FORMATEAR MONEDA MXN ──────────────────────────────────
function mxn(n){ return 'MX$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0}); }

// ── FIREBASE LISTENERS ───────────────────────────────────
onSnapshot(query(collection(db,'productos'),orderBy('nombre')), snap=>{
  productos = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderAll();
  document.getElementById('loader').classList.add('hide');
  setSyncing(false);
}, err=>{ console.error(err); setError(); document.getElementById('loader').classList.add('hide'); });

onSnapshot(query(collection(db,'movimientos'),orderBy('fecha','desc')), snap=>{
  movimientos = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMovimientos();
});

// ── NAVEGACIÓN ────────────────────────────────────────────
window.cambiarVista = v=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
};

// ── STATS ─────────────────────────────────────────────────
function renderStats(){
  const total   = productos.length;
  const unds    = productos.reduce((s,p)=>s+(+p.cantidad||0),0);
  const valor   = productos.reduce((s,p)=>s+((+p.cantidad||0)*(+p.precio||0)),0);
  const bajo    = productos.filter(p=>(+p.cantidad)<=(+p.stockMinimo||0)).length;
  document.getElementById('stats-grid').innerHTML=[
    {l:'Productos',  v:total,       c:'#4361ee'},
    {l:'Unidades',   v:unds,        c:'#27ae60'},
    {l:'Valor Total',v:mxn(valor),  c:'#ff8c42'},
    {l:'Stock Bajo', v:bajo,        c:bajo>0?'#e53935':'#27ae60'},
  ].map(s=>`<div class="stat-card" style="border-top:4px solid ${s.c}">
    <div class="stat-label">${s.l}</div>
    <div class="stat-value" style="color:${s.c}">${s.v}</div>
  </div>`).join('');
}

// ── ALERT ─────────────────────────────────────────────────
function renderAlert(){
  const bajo = productos.filter(p=>(+p.cantidad)<=(+p.stockMinimo||0));
  const b = document.getElementById('alert-banner');
  if(!bajo.length){b.style.display='none';return;}
  b.style.display='flex';
  document.getElementById('alert-items').innerHTML =
    bajo.map(p=>`• ${p.nombre} — ${p.cantidad} uds (mín: ${p.stockMinimo||0})`).join('<br>');
}

// ── PRODUCTOS ─────────────────────────────────────────────
function renderProductos(){
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const lista = q ? productos.filter(p=>[p.nombre,p.lote,p.proveedor].some(f=>(f||'').toLowerCase().includes(q))) : productos;
  const el = document.getElementById('lista-productos');
  if(!lista.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><p>${q?'No se encontraron resultados.':'Agrega tu primer producto con ＋'}</p></div>`;
    return;
  }
  el.innerHTML = lista.map(p=>{
    const bajo  = (+p.cantidad)<=(+p.stockMinimo||0);
    const dias  = p.fechaVencimiento ? Math.floor((new Date(p.fechaVencimiento)-new Date())/86400000) : null;
    const pronto= dias!==null && dias<=30 && dias>=0;
    const vfmt  = p.fechaVencimiento ? formatDateMX(p.fechaVencimiento) : '—';
    return `<div class="product-card ${bajo?'low-stock':''}">
      <div class="prod-name">
        <span>${p.nombre}</span>
        ${bajo?'<span class="badge badge-red">⚠️ Bajo</span>':''}
      </div>
      <div class="prod-grid">
        <div><div class="pf-label">Cantidad</div><div class="pf-value pf-big ${bajo?'c-red':'c-green'}">${p.cantidad}</div></div>
        <div><div class="pf-label">Precio Unit.</div><div class="pf-value pf-big c-orange">${mxn(p.precio)}</div></div>
        <div><div class="pf-label">Lote</div><div class="pf-value">${p.lote||'—'}</div></div>
        <div><div class="pf-label">Proveedor</div><div class="pf-value">${p.proveedor||'—'}</div></div>
        <div><div class="pf-label">Vencimiento</div>
          <div class="pf-value ${pronto?'c-orange':''}">${vfmt}${pronto?` <small>(${dias}d)</small>`:''}</div></div>
        <div><div class="pf-label">Stock mínimo</div><div class="pf-value">${p.stockMinimo||0}</div></div>
      </div>
      <div class="prod-actions">
        <button class="btn-move" onclick="abrirMovimiento('${p.id}')">⬆️⬇️ Movimiento</button>
        <button class="btn-edit" onclick="abrirEditar('${p.id}')">✏️ Editar</button>
        <button class="btn-del" onclick="eliminar('${p.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function renderAll(){ renderStats(); renderAlert(); renderProductos(); }

// ── MOVIMIENTOS ───────────────────────────────────────────
function renderMovimientos(){
  const el = document.getElementById('lista-movimientos');
  if(!movimientos.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>No hay movimientos registrados aún.</p></div>`;
    return;
  }
  el.innerHTML = movimientos.map(m=>{
    const fechaStr = m.fechaManual || (m.fecha?.toDate ? m.fecha.toDate().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '—');
    return `<div class="mov-card">
      <div class="mov-dot ${m.tipo}">${m.tipo==='entrada'?'⬆️':'⬇️'}</div>
      <div class="mov-info">
        <div class="mov-name">${m.nombreProducto}</div>
        <div class="mov-meta">${fechaStr} · ${m.motivo||'Sin motivo'}</div>
      </div>
      <div class="mov-qty ${m.tipo}">${m.tipo==='entrada'?'+':'-'}${m.cantidad}</div>
    </div>`;
  }).join('');
}

// ── MODALES ───────────────────────────────────────────────
window.abrirModal  = id=>{ document.getElementById(id).classList.add('show'); document.body.style.overflow='hidden'; };
window.cerrarModal = id=>{ document.getElementById(id).classList.remove('show'); document.body.style.overflow=''; };
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{ if(e.target===el) window.cerrarModal(el.id); }));

// ── PRODUCTO FORM ─────────────────────────────────────────
function limpiarForm(){
  ['f-nombre','f-cantidad','f-precio','f-lote','f-proveedor'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-stockmin').value='10';
  document.getElementById('edit-id').value='';
  document.getElementById('f-vencimiento').value='';
  document.getElementById('cal-label-venc').textContent='Seleccionar fecha';
  document.getElementById('cal-label-venc').className='placeholder';
  document.getElementById('modal-prod-title').textContent='➕ Nuevo Producto';
  closeCal('venc');
}

window.abrirNuevoProducto = ()=>{ limpiarForm(); window.abrirModal('modal-producto'); };

window.abrirEditar = id=>{
  const p=productos.find(x=>x.id===id); if(!p) return;
  document.getElementById('edit-id').value       = p.id;
  document.getElementById('f-nombre').value      = p.nombre||'';
  document.getElementById('f-cantidad').value    = p.cantidad||'';
  document.getElementById('f-precio').value      = p.precio||'';
  document.getElementById('f-lote').value        = p.lote||'';
  document.getElementById('f-proveedor').value   = p.proveedor||'';
  document.getElementById('f-stockmin').value    = p.stockMinimo||10;
  document.getElementById('f-vencimiento').value = p.fechaVencimiento||'';
  if(p.fechaVencimiento){
    document.getElementById('cal-label-venc').textContent = formatDateMX(p.fechaVencimiento);
    document.getElementById('cal-label-venc').className = '';
  }
  document.getElementById('modal-prod-title').textContent='✏️ Editar Producto';
  window.abrirModal('modal-producto');
};

window.guardarProducto = async()=>{
  const nombre   = document.getElementById('f-nombre').value.trim();
  const cantidad = document.getElementById('f-cantidad').value;
  const precio   = document.getElementById('f-precio').value;
  if(!nombre||!cantidad||!precio){ alert('Completa nombre, cantidad y precio'); return; }
  setSyncing(true);
  const data={
    nombre, cantidad:+cantidad, precio:+precio,
    lote:             document.getElementById('f-lote').value.trim(),
    proveedor:        document.getElementById('f-proveedor').value.trim(),
    fechaVencimiento: document.getElementById('f-vencimiento').value,
    stockMinimo:     +document.getElementById('f-stockmin').value||10,
  };
  try{
    const eid=document.getElementById('edit-id').value;
    if(eid) await updateDoc(doc(db,'productos',eid),data);
    else    await addDoc(collection(db,'productos'),data);
    window.cerrarModal('modal-producto');
    limpiarForm();
  }catch(e){ alert('Error: '+e.message); setSyncing(false); }
};

window.eliminar = async id=>{
  if(!confirm('¿Eliminar este producto?')) return;
  setSyncing(true);
  try{ await deleteDoc(doc(db,'productos',id)); }
  catch(e){ alert('Error: '+e.message); }
  setSyncing(false);
};

// ── MOVIMIENTO ────────────────────────────────────────────
window.setTipoMov = t=>{
  tipoMov=t;
  document.getElementById('btn-entrada').className='toggle-btn entrada'+(t==='entrada'?' active':'');
  document.getElementById('btn-salida').className ='toggle-btn salida' +(t==='salida' ?' active':'');
};

window.abrirMovimiento = id=>{
  movProdId=id;
  const p=productos.find(x=>x.id===id);
  document.getElementById('mov-prod-name').textContent=p?p.nombre:'';
  document.getElementById('m-cantidad').value='';
  document.getElementById('m-motivo').value='';
  document.getElementById('m-fecha').value='';
  document.getElementById('cal-label-mov').textContent='Hoy';
  document.getElementById('cal-label-mov').className='placeholder';
  window.setTipoMov('entrada');
  closeCal('mov');
  window.abrirModal('modal-movimiento');
};

window.guardarMovimiento = async()=>{
  const cant=+document.getElementById('m-cantidad').value;
  if(!cant||cant<=0){ alert('Ingresa una cantidad válida'); return; }
  const p=productos.find(x=>x.id===movProdId); if(!p) return;
  setSyncing(true);
  const nuevaCant = tipoMov==='entrada' ? (+p.cantidad)+cant : Math.max(0,(+p.cantidad)-cant);
  const fechaManual = document.getElementById('m-fecha').value
    ? formatDateMX(document.getElementById('m-fecha').value)
    : new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
  try{
    await updateDoc(doc(db,'productos',movProdId),{cantidad:nuevaCant});
    await addDoc(collection(db,'movimientos'),{
      productoId:movProdId, nombreProducto:p.nombre,
      tipo:tipoMov, cantidad:cant,
      motivo:document.getElementById('m-motivo').value.trim(),
      fechaManual, fecha:serverTimestamp(),
    });
    window.cerrarModal('modal-movimiento');
  }catch(e){ alert('Error: '+e.message); }
  setSyncing(false);
};

// ── EXPORTAR CSV ──────────────────────────────────────────
window.exportarCSV = ()=>{
  if(!productos.length){ alert('No hay productos para exportar'); return; }
  const rows=[
    ['Nombre','Cantidad','Precio MXN','Lote','Proveedor','Fecha Vencimiento','Stock Mínimo','Estado'],
    ...productos.map(p=>[
      p.nombre,p.cantidad,p.precio,p.lote||'',p.proveedor||'',
      p.fechaVencimiento||'',p.stockMinimo||0,
      (+p.cantidad)<=(+p.stockMinimo||0)?'STOCK BAJO':'OK'
    ])
  ];
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='inventario-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
};

// ── FORMATO FECHA MX ──────────────────────────────────────
function formatDateMX(iso){
  if(!iso) return '—';
  const [y,m,d]=iso.split('-');
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d} ${meses[+m-1]} ${y}`;
}

// ── CALENDARIO ────────────────────────────────────────────
const calState = { venc:{year:new Date().getFullYear(),month:new Date().getMonth()}, mov:{year:new Date().getFullYear(),month:new Date().getMonth()} };

window.toggleCal = key=>{
  const wrap = document.getElementById('cal-'+key);
  const isOpen = wrap.classList.contains('open');
  document.querySelectorAll('.cal-wrap').forEach(w=>w.classList.remove('open'));
  document.querySelectorAll('.cal-input-btn').forEach(b=>b.classList.remove('open'));
  if(!isOpen){ wrap.classList.add('open'); document.getElementById('cal-btn-'+key).classList.add('open'); renderCal(key); }
};

function closeCal(key){
  document.getElementById('cal-'+key).classList.remove('open');
  document.getElementById('cal-btn-'+key).classList.remove('open');
}

function renderCal(key){
  const s   = calState[key];
  const now = new Date();
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dias = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
  const firstDay = new Date(s.year, s.month, 1).getDay();
  const daysInMonth = new Date(s.year, s.month+1, 0).getDate();
  const prevDays = new Date(s.year, s.month, 0).getDate();
  const selectedVal = key==='venc' ? document.getElementById('f-vencimiento').value : document.getElementById('m-fecha').value;

  let html = `<div class="cal-header">
    <button class="cal-nav" onclick="calNav('${key}',-1)">‹</button>
    <span>${meses[s.month]} ${s.year}</span>
    <button class="cal-nav" onclick="calNav('${key}',1)">›</button>
  </div>
  <div class="cal-days-header">${dias.map(d=>`<span>${d}</span>`).join('')}</div>
  <div class="cal-grid">`;

  // días del mes anterior
  for(let i=firstDay-1;i>=0;i--){
    html+=`<button class="cal-day other-month" disabled>${prevDays-i}</button>`;
  }
  // días del mes actual
  for(let d=1;d<=daysInMonth;d++){
    const isoDate = `${s.year}-${String(s.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d===now.getDate() && s.month===now.getMonth() && s.year===now.getFullYear();
    const isSel   = isoDate===selectedVal;
    html+=`<button class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDay('${key}','${isoDate}',${d})">${d}</button>`;
  }
  // días del mes siguiente
  const remaining = 42 - firstDay - daysInMonth;
  for(let d=1;d<=remaining;d++){
    html+=`<button class="cal-day other-month" disabled>${d}</button>`;
  }
  html+='</div>';
  document.getElementById('cal-'+key).innerHTML=html;
}

window.calNav = (key,dir)=>{
  calState[key].month += dir;
  if(calState[key].month>11){calState[key].month=0;calState[key].year++;}
  if(calState[key].month<0) {calState[key].month=11;calState[key].year--;}
  renderCal(key);
};

window.selectDay = (key,iso,d)=>{
  if(key==='venc'){
    document.getElementById('f-vencimiento').value=iso;
    document.getElementById('cal-label-venc').textContent=formatDateMX(iso);
    document.getElementById('cal-label-venc').className='';
  } else {
    document.getElementById('m-fecha').value=iso;
    document.getElementById('cal-label-mov').textContent=formatDateMX(iso);
    document.getElementById('cal-label-mov').className='';
  }
  closeCal(key);
};
</script>
